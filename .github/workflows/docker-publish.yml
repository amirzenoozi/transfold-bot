name: Build and Push Tagged Version to Docker Hub

on:
  push:
    tags:
      - 'v*' # This triggers the workflow only when you push a tag starting with 'v' (e.g., v1.0, v2.4.1)

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/transfold
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # This uses the tag name from GitHub as the Docker tag (plus 'latest')
          tags: ${{ steps.meta.outputs.tags }}